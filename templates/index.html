<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Reference Analyzer</title>

  <style>
    :root{
      --bg1:#667eea;
      --bg2:#764ba2;
      --card:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow: 0 18px 45px rgba(0,0,0,.14);
      --radius: 18px;
      --pill:#f3f4f6;
      --accent:#4f46e5;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--ink);
      min-height:100vh;
    }

    .container{
      max-width: 980px;
      margin: 0 auto;
      padding: 22px 16px 60px;
    }

    header{
      text-align:center;
      color:#fff;
      padding: 10px 0 18px;
    }
    header h1{
      margin:0;
      font-size: 2.6rem;
      letter-spacing: .3px;
      line-height:1.05;
    }
    header h1 .note{ font-size: 2.2rem; margin-right: 6px; }
    header p{
      margin: 10px auto 0;
      max-width: 760px;
      opacity:.96;
      font-size: 1.06rem;
      line-height:1.55;
    }

    .card{
      background: var(--card);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 18px;
      margin: 14px 0;
    }

    .search-card{
      padding: 18px;
    }

    .row{
      display:flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .field{
      flex: 1 1 260px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }

    label{
      font-weight: 700;
      font-size: .92rem;
      color: rgba(17,24,39,.9);
    }

    input{
      width:100%;
      padding: 13px 14px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 1rem;
      outline:none;
      transition: .15s ease;
    }
    input:focus{
      border-color: rgba(79,70,229,.55);
      box-shadow: 0 0 0 4px rgba(79,70,229,.14);
    }

    button{
      appearance:none;
      border:none;
      cursor:pointer;
      background: linear-gradient(180deg, rgba(79,70,229,.95), rgba(99,102,241,.92));
      color:#fff;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 13px 18px;
      border-radius: 14px;
      box-shadow: 0 14px 30px rgba(17,24,39,.18);
      transition: transform .08s ease, filter .12s ease;
      white-space: nowrap;
    }
    button:hover{ filter: brightness(1.03); }
    button:active{ transform: translateY(1px); }
    button[disabled]{ opacity:.65; cursor:not-allowed; }

    .hint{
      margin-top: 10px;
      color: var(--muted);
      display:flex;
      gap: 8px;
      align-items:center;
      font-size:.98rem;
    }
    .hint .bulb{
      width: 22px; height: 22px;
      border-radius: 999px;
      background: rgba(79,70,229,.12);
      color: rgba(79,70,229,.95);
      display:flex; align-items:center; justify-content:center;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .meta{
      color: var(--muted);
      margin-top: 8px;
      font-size: .98rem;
    }

    .stats{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .stat{
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fff;
    }
    .stat .number{
      font-size: 1.25rem;
      font-weight: 900;
      margin-bottom: 2px;
    }
    .stat .label{
      font-size:.86rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .2px;
    }

    .summary-box{
      margin-top: 14px;
      background: rgba(79,70,229,.06);
      border: 1px solid rgba(79,70,229,.16);
      border-radius: 14px;
      padding: 12px 12px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .summary-box strong{
      display:block;
      margin-bottom: 8px;
      font-size: 1.02rem;
    }

    .pill{
      display:inline-flex;
      gap: 8px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--border);
      color: #111827;
      text-decoration:none;
      font-weight: 800;
    }

    .muted{ color: var(--muted); }

    .error{
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      color: rgba(185,28,28,1);
      font-weight: 800;
      padding: 14px;
      border-radius: 14px;
      white-space: pre-wrap;
    }

    /* Loading */
    .loading{
      display:flex;
      align-items:center;
      gap: 12px;
    }
    .spinner{
      width: 22px; height: 22px;
      border-radius: 999px;
      border: 3px solid rgba(17,24,39,.12);
      border-top-color: rgba(79,70,229,.95);
      animation: spin 0.85s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress{
      width: 100%;
      height: 10px;
      background: rgba(17,24,39,.08);
      border-radius: 999px;
      overflow:hidden;
      margin-top: 10px;
    }
    .bar{
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, rgba(79,70,229,.9), rgba(99,102,241,.8));
      border-radius: 999px;
      animation: move 1.1s ease-in-out infinite;
    }
    @keyframes move{
      0%{ transform: translateX(-40%); }
      50%{ transform: translateX(120%); }
      100%{ transform: translateX(-40%); }
    }

    /* Section cards */
    .section-title{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .section-title h3{
      margin:0;
      font-size: 1.35rem;
    }

    .tone{
      display:flex;
      gap: 8px;
      align-items:center;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-weight: 900;
      font-size: .92rem;
      color: rgba(17,24,39,.92);
    }
    .dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      background: rgba(79,70,229,.95);
    }

    details{
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fff;
    }
    summary{
      cursor:pointer;
      font-weight: 900;
      color: rgba(17,24,39,.9);
    }
    pre.lyrics{
      margin: 10px 0 0;
      padding: 12px;
      border-radius: 14px;
      background: rgba(17,24,39,.04);
      border: 1px solid rgba(17,24,39,.08);
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: .95rem;
      line-height: 1.55;
    }

    .meaning{
      margin-top: 12px;
      line-height: 1.65;
      font-size: 1.02rem;
      white-space: pre-wrap;
    }

    .keylines{
      margin-top: 12px;
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.22);
      border-left: 6px solid rgba(34,197,94,.85);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .keylines strong{ display:block; margin-bottom: 8px; }
    .keylines ul{ margin: 0; padding-left: 18px; }
    .keylines li{ margin: 6px 0; }

    /* Video thumbnail layout */
    .video-grid{
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
      align-items:start;
    }
    .thumb{
      border-radius: 18px;
      overflow:hidden;
      background:#111;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      position:relative;
    }
    .thumb img{
      width:100%;
      display:block;
      aspect-ratio:16/9;
      object-fit:cover;
    }
    .play-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(to top, rgba(0,0,0,.35), rgba(0,0,0,.05));
    }
    .play-btn{
      width:74px;
      height:52px;
      border-radius:14px;
      background: rgba(255,0,0,.92);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 10px 22px rgba(0,0,0,.25);
      color:#fff;
      font-size: 22px;
      font-weight: 900;
      padding-left: 4px;
    }

    @media (max-width: 820px){
      header h1{ font-size: 2.15rem; }
      .stats{ grid-template-columns: 1fr; }
      .video-grid{ grid-template-columns: 1fr; }
      button{ width:100%; }
      .row{ align-items: stretch; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1><span class="note">🎵</span>Music Reference Analyzer</h1>
      <p>Section-wise lyric meaning + key lines </p>
    </header>

    <div class="card search-card">
      <div class="row">
        <div class="field">
          <label for="artist">Artist</label>
          <input id="artist" placeholder="e.g., Coldplay" value="Coldplay" />
        </div>
        <div class="field">
          <label for="title">Song Title</label>
          <input id="title" placeholder="e.g., Yellow" value="Yellow" />
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; align-self:flex-end;">
          <button id="analyzeBtn">Analyze</button>
        </div>
      </div>

      <div class="hint">
        <div class="bulb">💡</div>
        <div>Try: Kendrick Lamar – HUMBLE</div>
      </div>
    </div>

    <div id="output"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function esc(x){
      return String(x ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function stripBracketHeaders(text){
      // used only for tone classification (not for display)
      return String(text || "").replace(/\[[^\]]+\]\s*/g, " ").trim();
    }

    function computeTone(label, lyrics, meaning){
      const s = (label + " " + stripBracketHeaders(lyrics) + " " + (meaning || "")).toLowerCase();

      // tiny heuristic (fast + good enough for a demo)
      const sad = ["cry","tears","alone","lonely","hurt","pain","goodbye","miss","broken","dark"];
      const romantic = ["love","heart","kiss","forever","baby","darling","mine","yours","shine"];
      const hopeful = ["hope","alive","rise","new","bright","light","stars","heal","strong"];
      const energetic = ["party","dance","fire","run","wild","loud","fast","fight","up"];

      const score = (arr) => arr.reduce((n,w)=> n + (s.includes(w)?1:0), 0);

      const scores = [
        {name:"Romantic", v:score(romantic)},
        {name:"Hopeful", v:score(hopeful)},
        {name:"Energetic", v:score(energetic)},
        {name:"Reflective", v: 0},
        {name:"Melancholic", v:score(sad)},
      ].sort((a,b)=>b.v-a.v);

      // if everything is 0, default
      const top = scores[0];
      if (!top || top.v === 0) return "Reflective";
      return top.name;
    }

    function showLoading(){
      $("output").innerHTML = `
        <div class="card">
          <div class="loading">
            <div class="spinner"></div>
            <div>
              <div style="font-weight:900; font-size:1.05rem;">Analyzing…</div>
              <div class="muted" style="margin-top:2px;">Generating summary + section explanations. This can take ~20–60s depending on model.</div>
              <div class="progress"><div class="bar"></div></div>
            </div>
          </div>
        </div>
      `;
    }

    function displayError(msg){
      $("output").innerHTML = `
        <div class="card">
          <div class="error">Error: ${esc(msg)}</div>
        </div>
      `;
    }

    function formatMaybeUnknown(v){
      if (!v) return "Unknown";
      const s = String(v).trim();
      return s.length ? s : "Unknown";
    }

    function displayResults(data){
      const song = data.song || {};
      const analysis = data.analysis || {};
      const sections = data.sections || [];

      let html = `
        <div class="card">
          <h2 style="margin:0; font-size:2rem;">${esc(song.title || "Unknown")} — ${esc(song.artist || "Unknown")}</h2>
          <div class="meta">
            <strong>Album:</strong> ${esc(formatMaybeUnknown(song.album))}
            &nbsp; | &nbsp;
            <strong>Released:</strong> ${esc(formatMaybeUnknown(song.release_date))}
          </div>

          <div class="stats">
            <div class="stat">
              <div class="number">${esc(analysis.sections_count ?? sections.length)}</div>
              <div class="label">Sections analyzed</div>
            </div>
            <div class="stat">
              <div class="number">${esc(analysis.processing_time_ms ?? "—")}ms</div>
              <div class="label">Processing time</div>
            </div>
            <div class="stat">
              <div class="number">${esc((analysis.song_summary || "").length ? "Done" : "—")}</div>
              <div class="label">Summary status</div>
            </div>
          </div>

          ${analysis.song_summary ? `
            <div class="summary-box"><strong>📝 Song Summary</strong>${esc(analysis.song_summary)}</div>
          ` : ""}
        </div>
      `;

      // ✅ Video: thumbnail + Watch link (no embed)
      const videoId =
        analysis.youtube_video_id ? String(analysis.youtube_video_id) :
        (() => {
          try {
            return analysis.youtube_video_url
              ? new URL(String(analysis.youtube_video_url)).searchParams.get("v")
              : null;
          } catch (e) {
            return null;
          }
        })();

      if (videoId) {
        const watchUrl = analysis.youtube_video_url
          ? String(analysis.youtube_video_url)
          : `https://www.youtube.com/watch?v=${videoId}`;

        const videoType = analysis.youtube_video_type || "Most relevant video";
        const thumbHQ = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

        html += `
          <div class="card">
            <h2 style="margin:0 0 12px; font-size:1.5rem;">🎬 Video (${esc(videoType)})</h2>

            <div class="video-grid">
              <div class="thumb">
                <a href="${esc(watchUrl)}" target="_blank" rel="noopener noreferrer" style="display:block; position:relative;">
                  <img src="${esc(thumbHQ)}" alt="YouTube thumbnail" />
                  <div class="play-overlay">
                    <div class="play-btn">▶</div>
                  </div>
                </a>
              </div>

              <div>
                <div class="muted" style="margin: 6px 0 10px;">
                </div>
                <a class="pill" href="${esc(watchUrl)}" target="_blank" rel="noopener noreferrer">▶ Watch on YouTube</a>
              </div>
            </div>
          </div>
        `;
      }

      // Sections
      if (!sections.length){
        html += `
          <div class="card">
            <div class="muted">No sections returned.</div>
          </div>
        `;
      } else {
        for (const sec of sections){
          const label = sec.label || "Section";
          const lyrics = sec.lyrics || "";
          const meaning = sec.meaning || "";
          const keyLines = Array.isArray(sec.key_lines) ? sec.key_lines : [];

          const tone = computeTone(label, lyrics, meaning);

          html += `
            <div class="card">
              <div class="section-title">
                <h3>${esc(label)}</h3>
                <div class="tone"><span class="dot"></span> ${esc(tone)}</div>
              </div>

              <details>
                <summary>Lyrics (click to expand)</summary>
                <pre class="lyrics">${esc(lyrics)}</pre>
              </details>

              ${meaning ? `<div class="meaning">${esc(meaning)}</div>` : `<div class="muted" style="margin-top:10px;">No explanation generated for this section.</div>`}

              ${keyLines.length ? `
                <div class="keylines">
                  <strong>Key lines</strong>
                  <ul>
                    ${keyLines.map(l => `<li>${esc(l)}</li>`).join("")}
                  </ul>
                </div>
              ` : ""}
            </div>
          `;
        }
      }

      $("output").innerHTML = html;
    }

    async function analyze(){
      const artist = $("artist").value.trim();
      const title = $("title").value.trim();

      if (!artist || !title){
        displayError("Please provide both artist and song title.");
        return;
      }

      const btn = $("analyzeBtn");
      btn.disabled = true;
      showLoading();

      try{
        const res = await fetch("/analyze", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ artist, title })
        });

        let payloadText = await res.text();
        let data = null;

        try{
          data = JSON.parse(payloadText);
        }catch(e){
          // If backend returns HTML error page, show raw snippet
          throw new Error("Server returned non-JSON response:\n" + payloadText.slice(0, 600));
        }

        if (!res.ok){
          throw new Error(data.error || data.message || ("Request failed: HTTP " + res.status));
        }

        if (!data || data.success !== true){
          throw new Error(data.error || "Unknown error.");
        }

        displayResults(data);

      }catch(err){
        displayError(err.message || String(err));
      }finally{
        btn.disabled = false;
      }
    }

    $("analyzeBtn").addEventListener("click", analyze);
    $("title").addEventListener("keydown", (e)=>{ if (e.key === "Enter") analyze(); });
    $("artist").addEventListener("keydown", (e)=>{ if (e.key === "Enter") analyze(); });
  </script>
</body>
</html>
